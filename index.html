<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEEN BELLA MD Pairing</title>
<style>
body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; }
h1 { color: #00ffff; margin-top: 40px; }
input, button { padding: 12px; margin: 10px; border-radius: 6px; border: none; }
button { background: #ff00ff; color: #fff; cursor: pointer; }
footer { margin-top: 40px; font-size: 14px; color: #aaa; }
.contact-btn { display: inline-block; background: #25D366; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
</style>
</head>
<body>

<h1>QUEEN BELLA MD Pairing</h1>
<p>Enter your phone and pairing code:</p>

<input type="text" id="phone" placeholder="+2547XXXXXXXX"><br>
<input type="text" id="code" placeholder="Pairing Code"><br>
<button onclick="pair()">Pair Now</button>

<p id="status"></p>

<a class="contact-btn" href="https://wa.me/254755660053" target="_blank">Contact Us</a>

<footer>Powered by Rodgers</footer>

<script>
async function pair() {
    const phone = document.getElementById('phone').value;
    const code = document.getElementById('code').value;

    if (!phone || !code) return alert('Enter phone and code');

    const res = await fetch('/api/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code })
    });

    const data = await res.json();
    document.getElementById('status').innerText = data.success ? data.message : data.error;
}
</script>

</body>
</html>
