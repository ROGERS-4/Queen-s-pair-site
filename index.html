<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEEN BELLA Pairing</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #111;
    color: #fff;
  }
  h1 { margin-bottom: 20px; }
  input { padding: 10px; font-size: 16px; margin-bottom: 10px; width: 250px; }
  button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #ff007f;
    color: white;
    border: none;
    cursor: pointer;
    margin-right: 10px;
  }
  footer {
    position: fixed;
    bottom: 10px;
    text-align: center;
    width: 100%;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>QUEEN BELLA Pairing</h1>
<input type="text" id="phone" placeholder="Enter WhatsApp number">
<button onclick="generateCode()">Generate Code</button>
<button onclick="contactUs()">Contact Us</button>
<p id="result"></p>

<footer>
  Powered by Rodgers
</footer>

<script>
  async function generateCode() {
    const phone = document.getElementById('phone').value;
    if (!phone) return alert('Please enter a valid number');

    // Call your backend API to generate the 8-digit code
    try {
      const res = await fetch(`/api/pair`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      if(data.code){
        document.getElementById('result').innerText = 'Your code: ' + data.code;
      } else {
        document.getElementById('result').innerText = 'Error generating code';
      }
    } catch (err) {
      document.getElementById('result').innerText = 'Server error';
    }
  }

  function contactUs() {
    window.open('https://wa.me/254755660053', '_blank');
  }
</script>

</body>
</html>
